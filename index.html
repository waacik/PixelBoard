<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#17191c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PixelBoard" />
  <title>PixelBoard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell" aria-label="PixelBoard dashboard">
    <section class="hero-card glass-card" aria-label="Zegar i data">
      <div class="brand-row">
        <span class="status-dot" aria-hidden="true"></span>
        <span>PixelBoard</span>
      </div>
      <div class="hero-content">
        <div id="time" class="time">--:--</div>
        <div id="weekday" class="weekday">Ładowanie...</div>
        <div id="date" class="date">--</div>
      </div>
    </section>

    <section class="weather-card glass-card" aria-label="Aktualna pogoda">
      <div class="weather-topline">
        <span id="location">Rugby, UK</span>
        <span id="updated">--</span>
      </div>

      <div class="weather-main">
        <div class="weather-summary">
          <div id="temperature" class="temperature">--°</div>
          <div id="description" class="description">Pobieram pogodę</div>
          <div class="feels-inline">Odczuwalna <span id="feelsInline">--°</span></div>
        </div>

        <div id="weatherIcon" class="weather-icon sun" aria-hidden="true">
          <span class="sun-core"></span>
        </div>
      </div>

      <div class="metrics">
        <div class="metric"><span>Opady</span><strong id="rain">--%</strong></div>
        <div class="metric"><span>Wiatr</span><strong id="wind">-- km/h</strong></div>
        <div class="metric"><span>Odcz.</span><strong id="feels">--°</strong></div>
      </div>
    </section>

    <section class="timer-card glass-card" aria-label="Stoper i minutnik">
      <div class="timer-mode-switch" aria-label="Tryb licznika">
        <button class="mode-button" data-mode="stopwatch">Stoper</button>
        <button class="mode-button active" data-mode="timer">Minutnik</button>
      </div>

      <div class="timer-stage">
        <div class="timer-ring" aria-hidden="true">
          <div class="timer-ring-progress"></div>
          <div class="timer-ticks"></div>
          <div class="timer-readout">
            <div id="timerDisplay" class="timer-display">05:00</div>
            <div id="timerSubLabel" class="timer-sub-label">🔔 Alarm na końcu</div>
          </div>
        </div>
      </div>

      <div class="timer-actions" aria-label="Sterowanie licznikiem">
        <button id="timerReset" class="timer-action secondary" type="button">↺ Resetuj</button>
        <button id="timerStart" class="timer-action primary" type="button">▶ Start</button>
        <button id="timerPause" class="timer-action secondary" type="button">Ⅱ Pauza</button>
      </div>

      <div class="timer-presets" aria-label="Szybki wybór minutnika">
        <button class="preset-button active" data-minutes="5">5 minut</button>
        <button class="preset-button" data-minutes="10">10 minut</button>
        <button class="preset-button" data-minutes="15">15 minut</button>
        <button id="customTimerButton" class="custom-time" type="button">
          <span>Własny</span>
          <strong id="customTimerValue">20 min</strong>
          <small aria-hidden="true">✎</small>
        </button>
      </div>
    </section>

    <section class="forecast-card glass-card" aria-label="Prognoza pogody">
      <div class="section-title">Następne dni</div>
      <div id="forecast" class="forecast-list">
        <div class="forecast-row skeleton"></div>
        <div class="forecast-row skeleton"></div>
        <div class="forecast-row skeleton"></div>
        <div class="forecast-row skeleton"></div>
        <div class="forecast-row skeleton"></div>
        <div class="forecast-row skeleton"></div>
        <div class="forecast-row skeleton"></div>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="clock.js"></script>
  <script src="weather.js"></script>
  <script src="timer.js"></script>
  <script src="app.js"></script>
</body>
</html>
